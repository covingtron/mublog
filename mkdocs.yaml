site_name: mublog
site_url: https://cov.ing/ton
site_dir: site/ton
theme:
    name: material
    palette:
        scheme: slate
        primary: indigo
        accent: teal
    font:
        text: Roboto
        code: JetBrains Mono
plugins:
    - blog:
          blog_dir: blog
          post_dir: blog/posts
    - search
markdown_extensions:
    - pymdownx.highlight
    - pymdownx.superfences
extra_css:
    - assets/trihard.css
extra_javascript:
    - assets/trihard.js
watch:
    - docs/blog
